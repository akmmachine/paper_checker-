  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }

    body { 
      font-family: 'Inter', sans-serif; 
      overscroll-behavior-y: none; /* Prevents unwanted pull-to-refresh on mobile */
      -webkit-tap-highlight-color: transparent; /* Removes blue box on iOS taps */
    }
    
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Smooth height handling for mobile browser bars */
    .h-screen-dynamic {
      height: 100dvh;
    }

    /* Custom scrollbar for desktop, hidden but functional for mobile */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    /* Android Ripple / iOS Scale Effect */
    .tap-target {
      transition: transform 0.1s ease, background-color 0.1s ease;
    }
    .tap-target:active {
      transform: scale(0.96);
    }
  </style>
